<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHiESTY Token Relay</title>
  <style>
    body { width: 300px; font-family: sans-serif; padding: 15px; background: #0A0A0C; color: white; border: 1px solid #333; }
    .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 10px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: all 0.3s; }
    .status-dot.active { background: #39FF14; box-shadow: 0 0 8px #39FF14; }
    .preview { font-family: monospace; background: #000; padding: 10px; border-radius: 4px; font-size: 10px; word-break: break-all; margin: 10px 0; border: 1px solid #222; color: #39FF14; }
    .footer-info { font-size: 9px; color: #555; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
    button { width: 100%; padding: 10px; margin-top: 8px; cursor: pointer; border: none; border-radius: 4px; font-weight: 800; font-size: 11px; text-transform: uppercase; transition: opacity 0.2s; }
    #relayBtn { background: #39FF14; color: black; }
    #clearBtn { background: #1a1a1a; color: #ff073a; border: 1px solid #333; }
    input[type="text"] { width: 100%; background: #000; border: 1px solid #222; color: white; padding: 8px; margin-bottom: 12px; font-size: 11px; box-sizing: border-box; }
    label { font-size: 10px; color: #71717A; display: block; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 11px; color: #ccc; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-weight: 900; letter-spacing: -0.5px;">SHiESTY <span style="color: #39FF14;">RELAY</span></span>
    <div id="statusDot" class="status-dot"></div>
  </div>

  <label>Backend API</label>
  <input type="text" id="backendUrl" value="https://shiesty.me">

  <label>Captured Token</label>
  <div class="preview" id="tokenPreview">Waiting for ARC Raiders...</div>
  <div style="font-size: 10px; color: #555;">Last Captured: <span id="timestamp">—</span></div>
  <div style="font-size: 9px; color: #39FF14; margin-top: 4px; display: none;" id="endpointInfo">Endpoint: <span id="endpointPath">—</span></div>
  <div style="font-size: 9px; color: #00D1FF; margin-top: 4px; display: none;" id="discoveryInfo">Discovered: <span id="discoveryPath">—</span></div>

  <label class="checkbox-label">
    <input type="checkbox" id="autoRelay" checked> Auto-relay to server
  </label>

  <button id="relayBtn">Relay Now</button>
  <button id="clearBtn">Clear Cache</button>
  
  <div class="footer-info">v1.0.0 // No middleman. Your data.</div>

  <script src="popup.js"></script>
</body>
</html>
