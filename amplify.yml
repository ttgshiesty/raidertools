version: 1
env:
  variables:
    VITE_SCHEDULE_DATA_URL: https://api.shiesty.me/schedule/map-events.json
    VITE_API_BASE_URL: https://api.shiesty.me
    VITE_COGNITO_USER_POOL_ID: us-east-2_ynuwUjqAW
    VITE_COGNITO_CLIENT_ID: 6tsli6scc0d412ger69rvrq5oh
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    # Vite default output directory
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
customHeaders:
  - pattern: '**/*'
    headers:
      - key: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.shiesty.me;"
